; Elecrow CrowPanel 1.28" HMI ESP32 Rotary Display

[platformio]
default_envs = elecrow128-serial

; Pi 5 (LunaticMaster): pio run -e pi-serial -t upload
[env:pi-serial]
extends = env:elecrow128-serial
upload_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_14:C1:9F:26:72:48-if00
monitor_port = /dev/serial/by-id/usb-Espressif_USB_JTAG_serial_debug_unit_14:C1:9F:26:72:48-if00

[env:elecrow128]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default
board_build.partitions = default.csv
board_build.flash_mode = qio
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=1
lib_deps =
  tzapu/WiFiManager @ ^2.0.17
  adafruit/Adafruit NeoPixel @ ^1.12.0
  lovyan03/LovyanGFX @ ^1.1.16

[env:elecrow128-serial]
extends = env:elecrow128
build_flags =
  ${env:elecrow128.build_flags}
  -DROTARY_TRANSPORT_SERIAL=1

[env:elecrow128-wifi]
extends = env:elecrow128
build_flags =
  ${env:elecrow128.build_flags}
  -DROTARY_TRANSPORT_WIFI=1
